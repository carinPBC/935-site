<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../images/logo-935-cream.svg" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EEO Public File Report — 93.5 Classic Rock</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/935-base.css?v=9" /><link rel="stylesheet" href="../css/935.css?v=9" />
  <style id="nav-critical">
    nav.main-nav{background:#ffffff !important;position:sticky !important;top:0 !important;z-index:9999 !important;}
    .main-nav-inner{width:100%;padding:0 48px;display:flex;align-items:center;justify-content:space-between;min-height:110px;}
    .nav-logo img{height:90px;width:auto;object-fit:contain;}
    @media(max-width:900px){.main-nav-inner{padding:0 20px;}}
    @media(max-width:640px){.nav-links-wrap{display:none !important;}.nav-hamburger{display:flex !important;}}
  </style>
  <style>
    body{background:#f5f8fb !important;}
    .eeo-wrap{max-width:960px;margin:0 auto;padding:48px 32px;font-family:inherit;color:#1a2332;}
    .eeo-header{margin-bottom:36px;padding-bottom:24px;border-bottom:3px solid #a32600;}
    .eeo-header h1{font-size:13px;font-weight:800;color:#a32600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
    .eeo-header h2{font-size:26px;font-weight:900;color:#111111;line-height:1.2;margin-bottom:4px;}
    .eeo-header .period{font-size:14px;color:#546e7a;margin-top:8px;}
    .eeo-section{margin-bottom:40px;padding-bottom:40px;border-bottom:1px solid #e8ecf0;}
    .eeo-section:last-child{border-bottom:none;}
    .eeo-section h3{font-size:15px;font-weight:800;color:#111111;text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #a32600;}
    .eeo-section p{font-size:14px;line-height:1.75;margin-bottom:12px;color:#2a3a4a;}
    .eeo-section p strong{color:#111111;}
    /* Tables */
    .eeo-wrap table{width:100%;border-collapse:collapse;margin:16px 0 24px;font-size:13px;}
    .eeo-wrap th{text-align:left;font-weight:700;padding:10px 14px;border-bottom:2px solid #111111;color:#111111;background:#ffffff;font-size:12px;text-transform:uppercase;letter-spacing:.04em;}
    .eeo-wrap td{padding:10px 14px;border-bottom:1px solid #e8ecf0;vertical-align:top;color:#2a3a4a;}
    .eeo-wrap tr:last-child td{border-bottom:none;}
    .eeo-wrap tr:hover td{background:#f5f8fb;}
    .eeo-wrap td strong{color:#111111;}
    /* Community events */
    .eeo-event{margin-bottom:24px;padding:18px 20px;background:#fff;border-radius:8px;border-left:4px solid #a32600;box-shadow:0 1px 6px rgba(0,0,0,.06);}
    .eeo-event-date{font-size:12px;font-weight:800;color:#a32600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
    .eeo-event-title{font-size:14px;font-weight:700;color:#111111;margin-bottom:8px;}
    .eeo-event p{font-size:13px;line-height:1.65;margin:0;color:#3a4a5a;}
    /* PDF link */
    .pdf-link{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;background:#111111;color:#fff;border-radius:6px;font-size:13px;font-weight:700;text-decoration:none;transition:background .15s;}
    .pdf-link:hover{background:#0a3a5c;}
    @media(max-width:640px){
      .eeo-wrap{padding:24px 16px;}
      .eeo-wrap th,.eeo-wrap td{padding:8px 10px;}
      .eeo-header h2{font-size:20px;}
    }
  </style>
</head>
<body class="crr-inner">
  <div id="site-header"></div>
  <div class="eeo-wrap">

    <div class="eeo-header">
      <h1>Prescott Broadcasting</h1>
      <h2>EEO Public File Report</h2>
      <div class="period">93.5 Classic Rock &mdash; FM 93.5</div>
    </div>

    <div style="padding:48px 0;text-align:center;color:#546e7a;font-size:15px;line-height:1.8;">
      <p>The EEO Annual Public File Report for 93.5 Classic Rock is currently being prepared.<br>Please check back soon.</p>
      <p style="margin-top:20px;">
        <a href="https://publicfiles.fcc.gov/fm-profile/935" target="_blank" rel="noopener" style="color:#a32600;font-weight:700;">View FCC Public Inspection File &rsaquo;</a>
      </p>
    </div>

  </div></div><!-- /eeo-wrap -->

  <div id="site-footer"></div>
  <script src="../js/theme.js"></script>
  <script src="../js/layout.js?v=1" data-depth="1"></script>
<script>
  // Station background color from globals
  (function() {
    var A = 'https://pbc-cms-production.up.railway.app';
    fetch(A + '/api/station-globals/935')
      .then(function(r){return r.json();})
      .then(function(g){
        var bg = g.page_bg || '#e9ba8f';
        document.documentElement.style.setProperty('--page-bg', bg);
        document.body.style.background = bg;
        var s = document.getElementById('pbc-page-bg');
        if (!s){s=document.createElement('style');s.id='pbc-page-bg';document.head.appendChild(s);}
        s.textContent = 'body,section,.content-wrap,.page-hero,.editorial-section,.inquiry-section,.psa-section,.event-submit-section,.cards-section,.schedule-wrap{background:'+bg+' !important}';
      }).catch(function(){});
  })();
</script>
</body>
</html>
